# Default configuration for debian13-web-hardening.
# Values can be overridden by config/profiles/*.conf or environment variables.

PROFILE="${PROFILE:-balanced}"

# Global behavior
WEB_SERVER_MODE="${WEB_SERVER_MODE:-true}"
FIREWALL_ALLOW_WEB="${FIREWALL_ALLOW_WEB:-true}"
DISABLE_IPV6="${DISABLE_IPV6:-false}"
AUTO_REBOOT="${AUTO_REBOOT:-false}"
INITIAL_BACKUP_ENABLED="${INITIAL_BACKUP_ENABLED:-true}"
INITIAL_BACKUP_REUSE_LATEST="${INITIAL_BACKUP_REUSE_LATEST:-true}"
AUTO_INSTALL_PREREQUISITES="${AUTO_INSTALL_PREREQUISITES:-true}"
INSTALL_SECURITY_TOOLS_ON_START="${INSTALL_SECURITY_TOOLS_ON_START:-false}"
NGINX_ONLY="${NGINX_ONLY:-true}"
APACHE_ENABLED="${APACHE_ENABLED:-false}"
NGINX_INSTALL_IF_MISSING="${NGINX_INSTALL_IF_MISSING:-true}"

# Reports
REPORT_HISTORY_ENABLED="${REPORT_HISTORY_ENABLED:-false}"
WEB_REPORT_ENABLED="${WEB_REPORT_ENABLED:-true}"
WEB_REPORT_FILE="${WEB_REPORT_FILE:-/var/www/html/hardening.html}"
WEB_REPORT_JSON_FILE="${WEB_REPORT_JSON_FILE:-/var/www/html/hardening-status.json}"
WEB_REPORT_REFRESH_SECONDS="${WEB_REPORT_REFRESH_SECONDS:-5}"
WEB_REPORT_LOG_LINES="${WEB_REPORT_LOG_LINES:-120}"
WEB_REPORT_LIVE_ENABLED="${WEB_REPORT_LIVE_ENABLED:-true}"

# SSH
SSH_PASSWORD_AUTH="${SSH_PASSWORD_AUTH:-auto}" # auto, yes, no
SSH_ALLOW_TCP_FORWARDING="${SSH_ALLOW_TCP_FORWARDING:-no}"
SSH_MAX_AUTH_TRIES="${SSH_MAX_AUTH_TRIES:-3}"
SSH_LOGIN_GRACE_TIME="${SSH_LOGIN_GRACE_TIME:-30}"
SSH_CLIENT_ALIVE_INTERVAL="${SSH_CLIENT_ALIVE_INTERVAL:-300}"
SSH_CLIENT_ALIVE_COUNT_MAX="${SSH_CLIENT_ALIVE_COUNT_MAX:-2}"

# Firewall
# Optional arrays. Override them by editing this file or a profile.
FIREWALL_EXTRA_TCP_PORTS=()
FIREWALL_EXTRA_UDP_PORTS=()

# Packages installed automatically before hardening modules when
# AUTO_INSTALL_PREREQUISITES=true.
PREREQUISITE_PACKAGES=(
  ca-certificates
  curl
  gnupg
  lsb-release
  apt-transport-https
  debian-archive-keyring
  procps
  iproute2
  sudo
)

# Security tools installed by --install-tools or when
# INSTALL_SECURITY_TOOLS_ON_START=true.
SECURITY_TOOL_PACKAGES=(
  openssh-server
  nftables
  fail2ban
  unattended-upgrades
  apt-listchanges
  needrestart
  auditd
  audispd-plugins
  apparmor
  apparmor-utils
  apparmor-profiles
  apparmor-profiles-extra
  lynis
  rkhunter
  chkrootkit
  debsums
  nmap
)

NGINX_TOOL_PACKAGES=(
  nginx
)

WAF_TOOL_PACKAGES=(
  modsecurity-crs
  libnginx-mod-http-modsecurity
)

OPTIONAL_SECURITY_PACKAGES=(
  trivy
)

# Initial baseline backup
# These paths cover configuration surfaces managed or inspected by this project.
# The backup keeps original permissions and is stored under /var/backups.
INITIAL_BACKUP_PATHS=(
  /etc/ssh
  /etc/nftables.conf
  /etc/fail2ban
  /etc/sysctl.conf
  /etc/sysctl.d
  /etc/apt/apt.conf.d
  /etc/apt/sources.list
  /etc/apt/sources.list.d
  /etc/nginx
  /etc/modsecurity
  /etc/audit
  /etc/auditd.conf
  /etc/apparmor
  /etc/apparmor.d
  /etc/default
  /etc/systemd/system
  /etc/needrestart
  /etc/rkhunter.conf
)

# Fail2ban
FAIL2BAN_BANTIME="${FAIL2BAN_BANTIME:-1h}"
FAIL2BAN_FINDTIME="${FAIL2BAN_FINDTIME:-10m}"
FAIL2BAN_MAXRETRY="${FAIL2BAN_MAXRETRY:-5}"
FAIL2BAN_IGNOREIP="${FAIL2BAN_IGNOREIP:-127.0.0.1/8 ::1}"

# Web hardening
NGINX_CLIENT_MAX_BODY_SIZE="${NGINX_CLIENT_MAX_BODY_SIZE:-10m}"
APACHE_SERVER_TOKENS="${APACHE_SERVER_TOKENS:-Prod}"
WAF_MODE="${WAF_MODE:-DetectionOnly}" # DetectionOnly or On

# Service hardening
SERVICE_DISABLE_CANDIDATES=(
  avahi-daemon
  cups
  bluetooth
  rpcbind
  nfs-server
  smbd
  vsftpd
  telnet
)

SERVICE_PROTECTED=(
  ssh
  sshd
  networking
  systemd-networkd
  NetworkManager
  docker
  containerd
  nginx
  apache2
  cron
  systemd-journald
  google-guest-agent
  google-osconfig-agent
  google-startup-scripts
  google-shutdown-scripts
)
