# Balanced profile: recommended default for most Debian 13 web servers.

PROFILE="balanced"
WEB_SERVER_MODE="true"
FIREWALL_ALLOW_WEB="true"
DISABLE_IPV6="false"
AUTO_REBOOT="false"

SSH_PASSWORD_AUTH="auto"
SSH_ALLOW_TCP_FORWARDING="no"
SSH_MAX_AUTH_TRIES="3"

FAIL2BAN_BANTIME="1h"
FAIL2BAN_FINDTIME="10m"
FAIL2BAN_MAXRETRY="5"

WAF_MODE="DetectionOnly"

