# Strict profile: stronger defaults, more likely to require application testing.

PROFILE="strict"
WEB_SERVER_MODE="true"
FIREWALL_ALLOW_WEB="true"
DISABLE_IPV6="true"
AUTO_REBOOT="false"

SSH_PASSWORD_AUTH="auto"
SSH_ALLOW_TCP_FORWARDING="no"
SSH_MAX_AUTH_TRIES="3"

FAIL2BAN_BANTIME="24h"
FAIL2BAN_FINDTIME="15m"
FAIL2BAN_MAXRETRY="4"

WAF_MODE="On"

