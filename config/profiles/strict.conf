# Strict profile: stronger defaults, more likely to require application testing.

PROFILE="strict"
WEB_SERVER_MODE="true"
FIREWALL_ALLOW_WEB="true"
DISABLE_IPV6="true"
AUTO_REBOOT="false"
INITIAL_BACKUP_ENABLED="true"
INITIAL_BACKUP_REUSE_LATEST="true"
AUTO_INSTALL_PREREQUISITES="true"
INSTALL_SECURITY_TOOLS_ON_START="true"
NGINX_ONLY="true"
APACHE_ENABLED="false"
NGINX_INSTALL_IF_MISSING="true"
REPORT_HISTORY_ENABLED="false"
WEB_REPORT_ENABLED="true"
WEB_REPORT_REFRESH_SECONDS="3"
WEB_REPORT_LOG_LINES="200"
WEB_REPORT_LIVE_ENABLED="true"

SSH_PASSWORD_AUTH="auto"
SSH_PORT="auto"
SSH_KEEP_CURRENT_PORT_ON_CHANGE="true"
SSH_ALLOW_TCP_FORWARDING="no"
SSH_MAX_AUTH_TRIES="3"

FAIL2BAN_BANTIME="24h"
FAIL2BAN_FINDTIME="15m"
FAIL2BAN_MAXRETRY="4"

WAF_MODE="On"
