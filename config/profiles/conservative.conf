# Conservative profile: minimal operational risk.

PROFILE="conservative"
WEB_SERVER_MODE="true"
FIREWALL_ALLOW_WEB="true"
DISABLE_IPV6="false"
AUTO_REBOOT="false"

SSH_PASSWORD_AUTH="auto"
SSH_ALLOW_TCP_FORWARDING="yes"
SSH_MAX_AUTH_TRIES="4"

FAIL2BAN_BANTIME="30m"
FAIL2BAN_FINDTIME="10m"
FAIL2BAN_MAXRETRY="6"

WAF_MODE="DetectionOnly"

